<script>
    const API_URL = "https://phantoms-backend.onrender.com/onebot/latest?limit=30";
    const messageBox = document.getElementById("messageBox");
    const skipBtn = document.getElementById("skipBtn");
    const voiceSelect = document.getElementById("voiceSelect");

    const config = {
      readName: document.getElementById("readName"),
      rate: document.getElementById("rate"),
      pitch: document.getElementById("pitch"),
      volume: document.getElementById("volume"),
      rateVal: document.getElementById("rateVal"),
      pitchVal: document.getElementById("pitchVal"),
      volVal: document.getElementById("volVal"),
      currentVoice: null,
      selectedVoiceName: localStorage.getItem("selectedVoice") || ""
    };

    const playedIds = new Set();
    let isSpeaking = false;
    let speechQueue = [];
    let currentUtterance = null;

    // 预缓存音色列表，避免切换时重新加载导致卡顿
    let voiceCache = [];
    function loadVoices() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices || voices.length === 0) return;

      voiceCache = voices.filter(v => v.lang.includes("zh") || v.lang.includes("cmn"));
      if (voiceCache.length === 0) return;

      voiceSelect.innerHTML = "";
      voiceCache.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v.name;
        opt.textContent = `${v.name} (${v.lang})`;
        voiceSelect.appendChild(opt);
      });

      let targetVoice = voiceCache.find(v => v.name === config.selectedVoiceName);
      if (!targetVoice) targetVoice = voiceCache[0];

      config.currentVoice = targetVoice;
      config.selectedVoiceName = targetVoice.name;
      voiceSelect.value = targetVoice.name;
      localStorage.setItem("selectedVoice", targetVoice.name);
    }

    // 只初始化一次，切换音色不再 reloadVoices
    setTimeout(() => {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        if (voiceCache.length === 0) loadVoices();
      };
    }, 500);

    // 切换音色：直接从缓存取，不重载，不卡顿
    voiceSelect.addEventListener("change", () => {
      const target = voiceCache.find(v => v.name === voiceSelect.value);
      if (target) {
        config.currentVoice = target;
        config.selectedVoiceName = target.name;
        localStorage.setItem("selectedVoice", target.name);
      }
    });

    // 跳过按钮
    skipBtn.addEventListener("click", () => {
      if (currentUtterance) currentUtterance.onend = null;
      window.speechSynthesis.cancel();
      isSpeaking = false;
      speechQueue = [];
      currentUtterance = null;
      setTimeout(() => speakNext(), 100);
    });

    // 核心播放函数
    function speakNext() {
      if (isSpeaking || speechQueue.length === 0) return;
      isSpeaking = true;

      const { nickname, text } = speechQueue.shift();
      let content = config.readName.checked ? `${nickname}说，${text}` : text;
      content = content.replace(/[\x00-\x1F\x7F]/g, "").trim();
      if (!content) {
        isSpeaking = false;
        return speakNext();
      }

      const u = new SpeechSynthesisUtterance(content);
      u.lang = "zh-CN";
      u.rate = +config.rate.value;
      u.pitch = +config.pitch.value;
      u.volume = +config.volume.value;
      u.voice = config.currentVoice;
      currentUtterance = u;

      u.onend = () => {
        isSpeaking = false;
        currentUtterance = null;
        setTimeout(() => speakNext(), 120);
      };
      u.onerror = (e) => {
        console.error("TTS错误", e);
        isSpeaking = false;
        currentUtterance = null;
        window.speechSynthesis.cancel();
        setTimeout(() => speakNext(), 300);
      };

      if (!window.speechSynthesis.speaking) {
        window.speechSynthesis.speak(u);
      }
    }

    function pushToQueue(nickname, text) {
      if (!text || !text.trim()) return;
      speechQueue.push({ nickname, text });
      if (!isSpeaking) speakNext();
    }

    function parseText(msg) {
      if (!msg?.message?.startsWith("{type=text")) return null;
      const m = msg.message.match(/text=([^}]+)}/);
      return m ? m[1].trim() : null;
    }

    async function loadMessages() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) return;
        let list = await res.json();
        list = Array.isArray(list) ? list.reverse() : [];
        const newIds = new Set();
        let html = "";

        list.forEach(item => {
          const text = parseText(item);
          if (!text) return;
          const name = (item.nickname || "用户").replace(/'/g, "\\'");
          const safeText = text.replace(/'/g, "\\'");
          const time = new Date(...item.timestamp).toLocaleString();
          newIds.add(item.id);

          html += `
          <div class="msg-item">
            <div class="content">
              <div class="name">${name}</div>
              <div class="text">${text}</div>
              <div class="time">${time}</div>
            </div>
            <button class="play-btn" onclick="pushToQueue('${name}','${safeText}')">播放</button>
          </div>`;

          if (!playedIds.has(item.id)) {
            playedIds.add(item.id);
            pushToQueue(name, text);
          }
        });

        if (html) messageBox.innerHTML = html;
        playedIds.forEach(id => { if (!newIds.has(id)) playedIds.delete(id); });
      } catch (e) {}
    }

    // 点击解锁音频上下文（必须）
    document.addEventListener("click", () => {
      window.speechSynthesis.resume();
      const empty = new SpeechSynthesisUtterance("");
      window.speechSynthesis.speak(empty);
      empty.onend = () => window.speechSynthesis.cancel();
    }, { once: true });

    // ======================================
    // ✅ 关键修复：切后台不断播
    // ======================================
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        // 切后台：什么都不做，不pause！
      } else {
        // 切回来：强制唤醒引擎，续播
        window.speechSynthesis.resume();
        if (!isSpeaking && speechQueue.length > 0) speakNext();
      }
    });

    // 防止浏览器冻结标签（Chrome 有效）
    if (navigator.userAgent.includes("Chrome")) {
      setInterval(() => {
        window.postMessage("keep-alive", "*");
      }, 3000);
    }

    config.rate.addEventListener("input", () => config.rateVal.textContent = config.rate.value);
    config.pitch.addEventListener("input", () => config.pitchVal.textContent = config.pitch.value);
    config.volume.addEventListener("input", () => config.volVal.textContent = config.volume.value);

    loadMessages();
    setInterval(loadMessages, 10000);
</script>
