<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>FF14 艾欧泽亚字体测试</title>
    <!-- 引用独立的 FF14 字体 CSS 文件 -->
    <link rel="stylesheet" href="ff14-fonts.css">
</head>
<body>

<h2>普通英文</h2>
<p>Hello World | ABCDEFG | 1234567890</p>

<h2>艾欧泽亚文字（使用 class：xiv-font-en）</h2>
<p class="xiv-font-en">Hello World</p>
<p class="xiv-font-en">ABCDEFG</p>
<p class="xiv-font-en">1234567890</p>

<h2>FF14 图标演示</h2>
金币：<i class="xiv gil"></i> &nbsp;&nbsp;
等级：<i class="xiv lv"></i> &nbsp;&nbsp;
HQ：<i class="xiv hq"></i> &nbsp;&nbsp;
水晶：<i class="xiv crystal"></i> &nbsp;&nbsp;
时间：<i class="xiv eorzea-time"></i>

</body>
</html>
