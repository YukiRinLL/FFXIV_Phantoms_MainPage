<!-- 弹窗 -->

<script>
    // API端点
    const API_URL = 'https://phantoms-backend.onrender.com/api/risingstones/guild-member-dynamic';

    // 本地数据源路径
    const LOCAL_DATA_SOURCE = './sample/guild-member-dynamic-modified.json';

    // 图片代理服务 - 使用images.weserv.nl
    const IMAGE_PROXY_URL = 'https://images.weserv.nl/?url=';

    // 默认头像
    const DEFAULT_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjYwIiBoZWlnaHQ9IjYwIiByeD0iMzAiIGZpbGw9IiMyNjJmNDkiLz4KPHN2ZyB4PSIxNSIgeT0iMTUiIHdpZHRoPSIzMCIgaGVpZ2h0PSIzMCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNlOTQ1NjAiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj4KPHBhdGggZD0iTTIwIDIxdi0yYTQgNCAwIDAgMC00LTRINGE0IDQgMCAwIDAtNCA0djIiLz4KPGNpcmNsZSBjeD0iMTIiIGN5PSI3IiByPSI0Ii8+Cjwvc3ZnPgo8L3N2Zz4K';

    // 全局变量存储数据
    let allActivitiesData = []; // 存储所有本地数据
    let activitiesData = []; // 当前显示的数据
    let filteredData = [];

    // 分页相关变量
    let currentPage = 1;
    const ITEMS_PER_PAGE = 1000;
    let hasMoreData = true;
    let isLoading = false;
    let currentFilterType = 'all';
    let currentSortBy = 'popular';
    let isUsingLocalData = false; // 标记是否在使用本地数据

    // 超时相关变量
    const REQUEST_TIMEOUT = 10000; // 10秒超时
    let requestTimeoutId = null;

    // 页面加载完成后获取数据
    document.addEventListener('DOMContentLoaded', function() {
        // 初始加载第一页数据
        fetchData(1, true);

        // 添加事件监听器
        document.getElementById('filter-type').addEventListener('change', function() {
            currentFilterType = this.value;
            currentPage = 1;
            hasMoreData = true;
            filterAndSortActivities(true);
        });

        document.getElementById('sort-by').addEventListener('change', function() {
            currentSortBy = this.value;
            currentPage = 1;
            hasMoreData = true;
            filterAndSortActivities(true);
        });

        document.getElementById('refresh-btn').addEventListener('click', function() {
            currentPage = 1;
            hasMoreData = true;
            isUsingLocalData = false;
            hideWarningMessage();
            fetchData(1, true);
        });

        // 加载更多按钮事件
        document.getElementById('load-more-btn').addEventListener('click', function() {
            if (!isLoading && hasMoreData) {
                loadMoreData();
            }
        });

        // 弹窗关闭事件
        document.querySelector('.close').addEventListener('click', closeModal);
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        });

        // 滚动加载监听
        window.addEventListener('scroll', handleScroll);
    });

    // 滚动加载处理
    function handleScroll() {
        // 如果正在加载或没有更多数据，则不处理
        if (isLoading || !hasMoreData) return;

        const loadMoreBtn = document.getElementById('load-more-btn');
        if (!loadMoreBtn || loadMoreBtn.style.display === 'none') {
            return;
        }

        // 计算距离底部的距离
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const windowHeight = window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;

        // 当滚动到距离底部200px以内时，自动加载更多
        if (scrollTop + windowHeight >= documentHeight - 200) {
            loadMoreData();
        }
    }

    // 加载更多数据（统一处理本地和远程）
    function loadMoreData() {
        if (isLoading || !hasMoreData) return;

        isLoading = true;
        showLoadingMore();

        if (isUsingLocalData) {
            // 使用本地数据的分页
            loadMoreLocalData();
        } else {
            // 使用API的分页
            fetchData(currentPage + 1, false);
        }
    }

    // 显示警告信息
    function showWarningMessage() {
        const warningElement = document.getElementById('warningMessage');
        warningElement.style.display = 'block';
        isUsingLocalData = true;
    }

    // 隐藏警告信息
    function hideWarningMessage() {
        const warningElement = document.getElementById('warningMessage');
        warningElement.style.display = 'none';
        isUsingLocalData = false;
    }

    // 从本地JSON文件加载数据
    async function loadLocalData() {
        try {
            const response = await fetch(LOCAL_DATA_SOURCE);
            if (!response.ok) {
                throw new Error('Failed to load local data');
            }
            const data = await response.json();

            // 统一数据格式处理
            if (data.code === 10000 && data.data) {
                return {
                    code: 10000,
                    data: data.data
                };
            } else if (data.data && data.data.rows) {
                return {
                    code: 10000,
                    data: data.data
                };
            } else if (data.rows) {
                return {
                    code: 10000,
                    data: {
                        rows: data.rows,
                        count: data.count || data.rows.length
                    }
                };
            } else {
                throw new Error('Invalid local data format');
            }
        } catch (error) {
            console.error('Failed to load local data:', error);
            return null;
        }
    }

    // 合并API数据和本地JSON数据
    function mergeApiAndJsonData(apiData, jsonData) {
        if (!apiData || !apiData.data) {
            return jsonData;
        }
        if (!jsonData || !jsonData.data) {
            return apiData;
        }

        const apiRows = apiData.data.rows || [];
        const jsonRows = jsonData.data.rows || [];

        // 创建一个Map用于合并数据，JSON数据优先级更高
        const mergedMap = new Map();

        // 先添加API数据
        apiRows.forEach(item => {
            if (item.id) {
                mergedMap.set(item.id, item);
            }
        });

        // 再添加JSON数据，相同ID会覆盖API数据
        jsonRows.forEach(item => {
            if (item.id) {
                mergedMap.set(item.id, item);
            }
        });

        // 转换为数组
        const mergedRows = Array.from(mergedMap.values());

        // 返回合并后的数据结构
        return {
            ...apiData,
            data: {
                ...apiData.data,
                rows: mergedRows,
                count: mergedRows.length
            }
        };
    }

    // 本地数据分页（客户端分页）
    async function loadMoreLocalData() {
        try {
            // 如果还没有加载所有本地数据，先加载
            if (allActivitiesData.length === 0) {
                const localData = await loadLocalData();
                if (!localData) {
                    throw new Error('无法加载本地数据');
                }
                allActivitiesData = localData.data.rows || [];

                // 先进行过滤和排序
                filterAndSortAllActivities();
            }

            // 计算要显示的下一页数据
            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;

            const newActivities = filteredData.slice(startIndex, endIndex);

            if (newActivities.length === 0) {
                hasMoreData = false;
                showNoMoreData();
                return;
            }

            // 如果是第一页，替换所有数据，否则追加数据
            if (currentPage === 1) {
                activitiesData = newActivities;
            } else {
                activitiesData = [...activitiesData, ...newActivities];
            }

            // 更新统计数据
            updateStats({
                code: 10000,
                data: {
                    count: filteredData.length
                }
            });

            // 显示数据
            displayActivities();

            // 更新分页状态
            if (endIndex >= filteredData.length) {
                hasMoreData = false;
                showNoMoreData();
            } else {
                currentPage++;
                hasMoreData = true;
                showLoadMoreButton();
            }

        } catch (error) {
            console.error('Error loading more local data:', error);
            showLoadMoreError('加载数据失败', error.message);
        } finally {
            isLoading = false;
            hideLoadingMore();
        }
    }

    // 过滤和排序所有本地数据
    function filterAndSortAllActivities() {
        // 过滤数据
        if (currentFilterType === 'all') {
            filteredData = [...allActivitiesData];
        } else if (currentFilterType === 'post') {
            filteredData = allActivitiesData.filter(activity => activity.from === 2);
        } else if (currentFilterType === 'recruit') {
            filteredData = allActivitiesData.filter(activity =>
                activity.from === 5 || activity.from === 6 || activity.from === 9 || activity.from === 7);
        } else if (currentFilterType === 'rp') {
            filteredData = allActivitiesData.filter(activity => activity.from === 8);
        }

        // 排序数据
        if (currentSortBy === 'newest') {
            filteredData.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        } else if (currentSortBy === 'oldest') {
            filteredData.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        } else if (currentSortBy === 'popular') {
            filteredData.sort((a, b) => {
                const aLikes = parseInt(a.like_count) || 0;
                const bLikes = parseInt(b.like_count) || 0;
                return bLikes - aLikes;
            });
        }
    }

    // 获取数据函数
    async function fetchData(page = 1, isRefresh = true) {
        // 防止重复请求
        if (isLoading) return;

        isLoading = true;

        // 设置超时定时器
        if (requestTimeoutId) {
            clearTimeout(requestTimeoutId);
        }

        requestTimeoutId = setTimeout(() => {
            handleRequestTimeout(isRefresh);
        }, REQUEST_TIMEOUT);

        // 显示加载状态
        if (isRefresh) {
            const container = document.getElementById('activity-container');
            container.innerHTML = '<div class="loading">正在加载数据...</div>';
            hideLoadMoreButton();
        } else {
            showLoadingMore();
        }

        try {
            // 并行请求API和本地JSON数据
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

            const [apiResponse, jsonResponse] = await Promise.all([
                fetch(`${API_URL}?page=${page}&limit=${ITEMS_PER_PAGE}`, { signal: controller.signal })
                    .catch(error => {
                        console.error('API请求失败:', error);
                        return null;
                    }),
                fetch(LOCAL_DATA_SOURCE).catch(error => {
                    console.error('本地数据加载失败:', error);
                    return null;
                })
            ]);

            clearTimeout(timeoutId);
            clearTimeout(requestTimeoutId);

            let apiData = null;
            let jsonData = null;

            // 处理API响应
            if (apiResponse && apiResponse.ok) {
                apiData = await apiResponse.json();
            }

            // 处理本地JSON响应
            if (jsonResponse && jsonResponse.ok) {
                jsonData = await jsonResponse.json();
            }

            // 合并数据
            const mergedData = mergeApiAndJsonData(apiData, jsonData);

            if (mergedData && mergedData.code === 10000) {
                // 合并成功，隐藏警告信息
                hideWarningMessage();
                isUsingLocalData = false;

                // 更新统计数据
                updateStats(mergedData);

                // 处理数据加载逻辑
                const newActivities = mergedData.data.rows || [];
                
                if (isRefresh) {
                    // 刷新时重置数据
                    currentPage = 1;
                    allActivitiesData = newActivities;
                    filterAndSortActivities(true);
                } else {
                    // 加载更多时追加数据到allActivitiesData
                    // 但需要确保没有重复数据
                    const existingIds = new Set(allActivitiesData.map(item => item.id));
                    const uniqueNewActivities = newActivities.filter(item => !existingIds.has(item.id));
                    allActivitiesData = [...allActivitiesData, ...uniqueNewActivities];
                    
                    // 重新过滤和排序所有数据，但不重置分页
                    filterAndSortActivities(false);
                }

                // 检查是否还有更多数据
                const totalItems = mergedData.data.count || 0;
                hasMoreData = (allActivitiesData.length < totalItems);

                if (!hasMoreData) {
                    showNoMoreData();
                }
            } else {
                throw new Error('数据合并失败');
            }
        } catch (error) {
            clearTimeout(requestTimeoutId);
            console.error('数据获取失败:', error);

            // 尝试加载本地数据作为最后手段
            const localData = await loadLocalData();

            if (localData) {
                // 本地数据加载成功
                isUsingLocalData = true;
                allActivitiesData = localData.data.rows || [];

                if (isRefresh) {
                    currentPage = 1;
                    filterAndSortAllActivities();
                    await loadMoreLocalData();
                } else {
                    await loadMoreLocalData();
                }
            } else {
                // 本地数据也加载失败，显示错误
                if (isRefresh) {
                    const container = document.getElementById('activity-container');
                    let errorMessage = '加载数据失败';
                    let errorDetail = error.message;

                    if (error.message.includes('Failed to get guild member dynamic info')) {
                        errorMessage = '石之家功能维护中';
                        errorDetail = '请稍后再试，或联系管理员';
                    } else if (error.name === 'AbortError' || error.message.includes('timeout')) {
                        errorMessage = '石之家功能维护中';
                        errorDetail = '请求超时，请稍后再试';
                    } else if (error.message.includes('服务器返回错误')) {
                        errorMessage = '石之家功能维护中';
                        errorDetail = error.message || '请稍后再试，或联系管理员';
                    }

                    container.innerHTML = `
                        <div class="error-container">
                            <div class="error-title">${errorMessage}</div>
                            <div class="error-message">${errorDetail}</div>
                            <button onclick="location.reload()" class="reload-button">
                                重新加载
                            </button>
                        </div>
                    `;
                } else {
                    showLoadMoreError('加载数据失败', error.message);
                }
                hasMoreData = false;
                showNoMoreData();
            }
        } finally {
            isLoading = false;
            hideLoadingMore();

            if (requestTimeoutId) {
                clearTimeout(requestTimeoutId);
                requestTimeoutId = null;
            }
        }
    }

    // 添加加载更多时的错误显示函数
    function showLoadMoreError(errorMessage, errorDetail) {
        // 创建一个临时的错误提示元素
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-container';
        errorDiv.innerHTML = `
            <div class="error-title">${errorMessage}</div>
            <div class="error-message">${errorDetail}</div>
        `;

        // 将错误提示插入到活动列表后面
        const container = document.getElementById('activity-container');
        container.parentNode.insertBefore(errorDiv, container.nextSibling);

        // 5秒后自动移除错误提示
        setTimeout(() => {
            if (errorDiv.parentNode) {
                errorDiv.parentNode.removeChild(errorDiv);
            }
        }, 5000);
    }

    // 超时处理函数
    function handleRequestTimeout(isRefresh) {
        if (isLoading) {
            isLoading = false;
            hideLoadingMore();

            if (isRefresh) {
                const container = document.getElementById('activity-container');
                container.innerHTML = `
                    <div class="error-container">
                        <div class="error-title">石之家功能维护中</div>
                        <div class="error-message">请求超时，尝试加载本地数据...</div>
                        <button onclick="location.reload()" class="reload-button">
                            重新加载
                        </button>
                    </div>
                `;
            } else {
                showLoadMoreError('石之家功能维护中', '请求超时，尝试加载本地数据...');
            }
        }
    }

    // 更新统计信息
    function updateStats(data) {
        // 使用API返回的count作为Total值，添加安全检查
        let totalCount = 0;
        if (data && data.data && data.data.count) {
            totalCount = parseInt(data.data.count);
        } else {
            totalCount = allActivitiesData.length;
        }
        document.getElementById('total-count').textContent = totalCount;

        // 其他统计保持不变
        const postCount = allActivitiesData.filter(activity => activity.from === 2).length;
        const recruitCount = allActivitiesData.filter(activity =>
            activity.from === 5 || activity.from === 6 || activity.from === 9 || activity.from === 7).length;
        const rpCount = allActivitiesData.filter(activity => activity.from === 8).length;

        document.getElementById('post-count').textContent = postCount;
        document.getElementById('recruit-count').textContent = recruitCount;
        document.getElementById('rp-count').textContent = rpCount;
    }

    // 过滤和排序活动
    function filterAndSortActivities(resetPagination = true) {
        // 过滤数据
        if (currentFilterType === 'all') {
            filteredData = [...allActivitiesData];
        } else if (currentFilterType === 'post') {
            filteredData = allActivitiesData.filter(activity => activity.from === 2);
        } else if (currentFilterType === 'recruit') {
            filteredData = allActivitiesData.filter(activity =>
                activity.from === 5 || activity.from === 6 || activity.from === 9 || activity.from === 7);
        } else if (currentFilterType === 'rp') {
            filteredData = allActivitiesData.filter(activity => activity.from === 8);
        }

        // 排序数据
        if (currentSortBy === 'newest') {
            filteredData.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        } else if (currentSortBy === 'oldest') {
            filteredData.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        } else if (currentSortBy === 'popular') {
            filteredData.sort((a, b) => {
                const aLikes = parseInt(a.like_count) || 0;
                const bLikes = parseInt(b.like_count) || 0;
                return bLikes - aLikes;
            });
        }

        // 计算当前已显示的数据数量
        const currentDisplayCount = resetPagination ? 0 : activitiesData.length;
        
        // 分页显示
        const startIndex = currentDisplayCount;
        const endIndex = startIndex + ITEMS_PER_PAGE;
        
        if (resetPagination) {
            // 刷新时替换数据
            activitiesData = filteredData.slice(startIndex, endIndex);
            currentPage = 2; // 下一页是第2页
        } else {
            // 加载更多时追加数据
            activitiesData = [...activitiesData, ...filteredData.slice(startIndex, endIndex)];
            currentPage++;
        }

        displayActivities();

        // 检查是否还有更多数据
        hasMoreData = endIndex < filteredData.length;
        if (!hasMoreData) {
            showNoMoreData();
        } else {
            showLoadMoreButton();
        }
    }

    // 显示活动
    function displayActivities() {
        const container = document.getElementById('activity-container');

        if (activitiesData.length === 0) {
            container.innerHTML = '<div class="loading">没有找到匹配的活动</div>';
            hideLoadMoreButton();
            return;
        }

        container.innerHTML = '<div class="activity-list"></div>';
        const activityList = container.querySelector('.activity-list');

        activitiesData.forEach(activity => {
            const activityCard = createActivityCard(activity);
            activityList.appendChild(activityCard);
        });

        // 如果有更多数据，显示加载更多按钮
        if (hasMoreData) {
            showLoadMoreButton();
        } else {
            showNoMoreData();
        }
    }

    // 创建活动卡片
    function createActivityCard(activity) {
        const card = document.createElement('div');
        card.className = 'activity-card';
        card.dataset.activityId = activity.id || activity.created_at;

        // 解析徽章数据
        let badges = [];
        try {
            if (activity.badge && activity.badge !== '[]') {
                badges = JSON.parse(activity.badge);
            }
        } catch (e) {
            console.error('Error parsing badges:', e);
            badges = [];
        }

        // 获取活动类型和内容
        const { typeText, title, content, coverImage } = getActivityDetails(activity);

        // 使用代理处理图片URL
        const avatarUrl = activity.avatar ? getProxiedImageUrl(activity.avatar) : DEFAULT_AVATAR;
        const coverUrl = coverImage ? getProxiedImageUrl(coverImage) : null;

        card.innerHTML = `
            <div class="activity-header">
                <img src="${avatarUrl}" alt="头像" class="avatar" onerror="this.src='${DEFAULT_AVATAR}'">
                <div class="character-info">
                    <div class="character-name">${escapeHtml(activity.character_name)}</div>
                    <div class="server-info">${escapeHtml(activity.area_name)} · ${escapeHtml(activity.group_name)}</div>
                    <span class="activity-type">${escapeHtml(typeText)}</span>
                </div>
            </div>

            <div class="activity-content">
                <div class="activity-title">${escapeHtml(title || '无标题')}</div>
                <div class="activity-preview">${escapeHtml(content)}</div>
                ${coverUrl ? `<img src="${coverUrl}" class="cover-image" alt="封面" onerror="this.style.display='none'">` : ''}
            </div>

            ${badges.length > 0 ? `
            <div class="badges">
                ${badges.slice(0, 3).map(badge =>
                    `<span class="badge">${escapeHtml(badge.badgeName)}</span>`
                ).join('')}
                ${badges.length > 3 ? `<span class="badge">+${badges.length - 3}更多</span>` : ''}
            </div>
            ` : ''}

            <div class="activity-meta">
                <div>${formatDate(activity.created_at)}</div>
                <div>❤️ ${escapeHtml(activity.like_count)} · 💬 ${escapeHtml(activity.comment_count)}</div>
            </div>

        // 添加点击事件打开弹窗
        card.addEventListener('click', function(e) {
            if (!e.target.closest('.badge')) { // 避免点击徽章时打开弹窗
                openModal(activity);
            }
        });

        return card;
    }

    // HTML转义函数
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 打开弹窗显示详细信息

        // 清空之前的内容
        modalBody.innerHTML = '';

    // 创建活动内容部分
    function createContentSection(activity) {
        const section = document.createElement('div');
        section.className = 'modal-section';

        const { title } = getActivityDetails(activity);
        let content = '';

        // 根据活动类型获取内容
        if (activity.from === 2 && activity.from_info) { // 帖子
            content = activity.from_info.content || '';
        } else if (activity.from === 5 && activity.from_info) { // 导师招募
            content = activity.from_info.detail || '';
        } else if (activity.from === 6 && activity.from_info) { // 副本招募
            content = activity.from_info.progress || '';
        } else if (activity.from === 7 && activity.from_info) { // 分享招募
            content = activity.from_info.detail || '';
        } else if (activity.from === 8 && activity.from_info) { // RP活动
            content = activity.from_info.profile || '';
        } else if (activity.from === 9 && activity.from_info) { // 其他招募
            content = activity.from_info.detail || '';
        } else {
            content = activity.mask_content || '';
        }

        // 处理表情标记
        content = convertEmojiTags(content);

        // 处理图片
        let imagesHtml = '';
        if (activity.pic_url) {
            const proxiedUrl = getProxiedImageUrl(activity.pic_url);
            imagesHtml = `<img src="${proxiedUrl}" class="modal-image" alt="动态图片" onerror="this.style.display='none'">`;
        }

        section.innerHTML = `
            <h3>${escapeHtml(title || '动态内容')}</h3>
            <div class="modal-content-text">${content}</div>
            ${imagesHtml ? `<div class="modal-images">${imagesHtml}</div>` : ''}
        `;

        return section;
    }

    function createDetailSection(activity) {
        const section = document.createElement('div');
        section.className = 'modal-section';

        const fields = [];

        // 添加基本字段
        fields.push({
            label: '发布时间',

        });

        fields.push({

            value: activity.comment_count || '0'
        });

        if (activity.from === 2 && activity.from_info) { // 帖子
            if (activity.from_info.tags) {
                fields.push({
                    label: '标签',
                    value: activity.from_info.tags
                });
            }
        } else if (activity.from === 5 && activity.from_info) { // 导师招募
            if (activity.from_info.requirements) {
                fields.push({
                    label: '要求',
                    value: activity.from_info.requirements
                });
            }
            if (activity.from_info.contact) {
                fields.push({
                    label: '联系方式',
                    value: activity.from_info.contact
                });
            }
        } else if (activity.from === 6 && activity.from_info) { // 副本招募
            if (activity.from_info.difficulty) {
                fields.push({
                    label: '难度',
                    value: activity.from_info.difficulty
                });
            }
            if (activity.from_info.party_size) {
                fields.push({
                    label: '队伍规模',
                    value: activity.from_info.party_size
                });
            }
        } else if (activity.from === 8 && activity.from_info) { // RP活动
            if (activity.from_info.time) {
                fields.push({
                    label: '活动时间',
                    value: activity.from_info.time
                });
            }
            if (activity.from_info.location) {
                fields.push({
                    label: '活动地点',
                    value: activity.from_info.location
                });
            }
        }

        if (fields.length === 3) return null; // 如果只有基本字段，不显示详情部分

        fields.forEach(field => {
            fieldsHtml += `
                <div class="modal-field">
                    <strong>${escapeHtml(field.label)}：</strong>
                    <span class="modal-field-value">${escapeHtml(field.value)}</span>
                </div>
            `;
        });

        section.innerHTML = `
            <h3>详细信息</h3>
            ${fieldsHtml}
        `;

        return section;
    }

    // 关闭弹窗
    function closeModal() {
        const modal = document.getElementById('detailModal');
        modal.style.display = 'none';
    }

    // 获取代理图片URL
    function getProxiedImageUrl(originalUrl) {
        // 如果已经是代理URL，直接返回
        if (originalUrl.includes('weserv.nl')) {
            return originalUrl;
        }

        // 使用images.weserv.nl代理服务
        return `${IMAGE_PROXY_URL}${encodeURIComponent(originalUrl)}`;
    }

    // 表情标记转换函数
    function convertEmojiTags(text) {
        if (!text) return text;

        // 将表情标记 [emo19] 转换为图片标签
        // 正则表达式匹配 [emo数字] 格式
        return text.replace(/\[emo(\d+)\]/g, function(match, emojiId) {
            // 构建表情图片URL
            const emojiUrl = `https://static.web.sdo.com/jijiamobile/pic/ff14/2023ffstone/emo${emojiId}.png`;
            // 使用代理URL
            const proxiedUrl = getProxiedImageUrl(emojiUrl);

            // 返回图片标签，设置合适的大小
            return `<img src="${proxiedUrl}" alt="表情${emojiId}" class="emoji" onerror="this.style.display='none'">`;
        });
    }

    // 获取活动详情
    function getActivityDetails(activity) {
        let typeText = '未知';
        let title = '';
        let content = '';
        let coverImage = '';

        // 根据from字段判断活动类型
        switch(activity.from) {
            case 1: // 普通动态
                typeText = '发布了动态';
                content = activity.mask_content || '';
                coverImage = activity.pic_url || '';
                break;
            case 2: // 帖子
                typeText = '发表了帖子';
                if (activity.from_info) {
                    title = activity.from_info.title || '';
                    content = activity.from_info.content_pre || '';
                    coverImage = activity.from_info.cover_pic || '';
                }
                break;
            case 5: // 导师招募
                typeText = '发布了导师招募';
                if (activity.from_info) {
                    title = activity.from_info.title || '';
                    content = activity.from_info.detail_mask || '';
                }
                break;
            case 6: // 副本招募
                typeText = '发布了副本招募';
                if (activity.from_info) {
                    title = activity.from_info.fb_name || '';
                    content = activity.from_info.progress || '';
                }
                break;
            case 7: // 分享招募
                typeText = '分享了招募';
                if (activity.from_info) {
                    title = (activity.from_info.guild_name || '') + (activity.from_info.guild_tag ? ` <${activity.from_info.guild_tag}>` : '');
                    content = activity.from_info.detail_mask || '';
                    coverImage = activity.from_info.cover_pic || '';
                }
                break;
            case 8: // RP活动
                typeText = '发布了RP活动';
                if (activity.from_info) {
                    title = activity.from_info.rp_name || '';
                    content = activity.from_info.profile || '';
                    coverImage = activity.from_info.cover_pic || '';
                }
                break;
            case 9: // 其他招募
                typeText = '发布了招募';
                if (activity.from_info) {
                    title = activity.from_info.title || '';
                    content = activity.from_info.detail_mask || '';
                }
                break;
            default:
                typeText = activity.mask_content || '发布了内容';
        }

        // 如果内容为空，使用mask_content
        if (!content && activity.mask_content) {
            const meaninglessTexts = ['发表了帖子：', '发布了招募：', '发布了RP：', '上架了招募：', '分享招募-'];
            const isMeaningless = meaninglessTexts.some(text => activity.mask_content.includes(text));

            if (!isMeaningless) {
                content = activity.mask_content;
            }
        }

        // 处理HTML标签，提取纯文本用于预览
        if (content && content.includes('<')) {
            content = content.replace(/<[^>]*>/g, '');
        }

        // 限制内容长度用于预览
        if (content && content.length > 100) {
            content = content.substring(0, 100) + '...';
        }

        return { typeText, title, content, coverImage };
    }

    // 日期格式化函数
    function formatDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / (1000 * 60));
        const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

        if (diffMins < 1) {
            return '刚刚';
        } else if (diffMins < 60) {
            return `${diffMins}分钟前`;
        } else if (diffHours < 24) {
            return `${diffHours}小时前`;
        } else if (diffDays < 7) {
            return `${diffDays}天前`;
        } else {
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }
    }

    // 完整日期格式化函数
    function formatFullDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // 显示加载更多按钮
    function showLoadMoreButton() {
        const container = document.getElementById('load-more-container');
        const button = document.getElementById('load-more-btn');
        const noMoreData = document.getElementById('no-more-data');

        container.style.display = 'block';
        button.style.display = 'inline-block';
        noMoreData.style.display = 'none';
    }

    // 隐藏加载更多按钮
    function hideLoadMoreButton() {
        const container = document.getElementById('load-more-container');
        container.style.display = 'none';
    }

    // 显示加载中状态
    function showLoadingMore() {
        const button = document.getElementById('load-more-btn');
        if (!button) return;

        const loadingIcon = button.querySelector('.loading-more');

        button.disabled = true;
        if (loadingIcon) {
            loadingIcon.style.display = 'inline-block';
        }
        button.innerHTML = '<span class="loading-more"></span> 加载中...';
    }

    // 隐藏加载中状态
    function hideLoadingMore() {
        const button = document.getElementById('load-more-btn');
        if (!button) return;

        button.disabled = false;
        const loadingIcon = button.querySelector('.loading-more');
        if (loadingIcon) {
            loadingIcon.style.display = 'none';
        }
        button.innerHTML = '加载更多';
    }

    // 显示没有更多数据
    function showNoMoreData() {
        const container = document.getElementById('load-more-container');
        const button = document.getElementById('load-more-btn');
        const noMoreData = document.getElementById('no-more-data');

        container.style.display = 'block';
        button.style.display = 'none';
        noMoreData.style.display = 'block';
    }
</script>
